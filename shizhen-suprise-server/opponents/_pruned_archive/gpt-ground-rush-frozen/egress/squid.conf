# Egress allowlist for the participant container — it may reach ONLY openrouter.ai
# over HTTPS (CONNECT :443). Everything else is denied. This is the sole route to
# the internet for the participant container (it sits on an `internal` Docker
# network and uses this proxy via HTTPS_PROXY); without an allow match below,
# traffic is dropped. This mirrors the organizer's competition environment
# (tools/egress/squid.conf in the parent repo) so a local test matches the event.
#
# NOTE: this restricts by HOST + PORT only. The request PATH (/api/v1/chat/...) is
# inside TLS and cannot be filtered without MITM interception, which we do not do.

# Listen for proxy + CONNECT tunnels.
http_port 3128

# Only HTTPS CONNECT tunnels to openrouter.ai on 443 are allowed.
acl openrouter dstdomain .openrouter.ai
acl ssl_ports port 443
acl connect_method method CONNECT

# Permit CONNECT openrouter.ai:443; deny all other CONNECTs and all plain HTTP.
http_access allow connect_method openrouter ssl_ports
http_access deny all

# Keep it quiet/light; no caching needed for a pass-through allowlist proxy.
cache deny all
# No access log: squid drops privileges to the unprivileged 'proxy' user, which
# cannot open /dev/stdout (FATAL on startup with ubuntu/squid's squid 6.13). The
# allow/deny ENFORCEMENT below is unaffected. To debug what gets blocked, swap to
# a proxy-writable path:  access_log stdio:/var/log/squid/access.log
access_log none
shutdown_lifetime 1 second
